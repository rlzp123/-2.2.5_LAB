<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contatos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Lista de Contatos</h1>

    <!-- FORMULÁRIO -->
    <div class="card">
      <h2>Adicionar Contato</h2>
      <input type="text" id="nome" placeholder="Nome">
      <input type="text" id="telefone" placeholder="Telefone">
      <input type="email" id="email" placeholder="Email">
      <button onclick="adicionarContato()">Adicionar</button>
    </div>

    <!-- PRIMEIRO -->
    <div class="card">
      <h2>Primeiro Contato</h2>
      <p id="primeiro"></p>
    </div>

    <!-- ÚLTIMO -->
    <div class="card">
      <h2>Último Contato</h2>
      <p id="ultimo"></p>
    </div>

    <!-- LISTA -->
    <div class="card">
      <h2>Todos os Contatos</h2>
      <ul id="lista"></ul>
    </div>

  </div>

  <script src="atividade.js"></script>

  <p>
    By @_015.ryan_
  </p>



</body>
</html>
